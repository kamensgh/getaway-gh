name: Update Social Feed

on:
  schedule:
    # Runs daily at 7:00 AM UTC (9:00 AM Ghana time — GMT+0, no DST)
    - cron: '0 7 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run social feed scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: node scripts/update-social-feed.js

      - name: Commit updated feed
        run: |
          git config user.name "Getaway Bot"
          git config user.email "bot@getaway.gh"
          git add src/data/social-feed.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update social feed $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN
